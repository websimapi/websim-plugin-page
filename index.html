<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PostMessage AI Bridge</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="importmap">
    {
      "imports": {
        "nanoid": "https://cdn.jsdelivr.net/npm/nanoid/nanoid.js"
      }
    }
  </script>
</head>
<body>
  <main class="container">
    <h1>PostMessage AI Bridge</h1>
    <p class="hint">This page supports inbound/outbound postMessage with JSON instructions. Open console to see messages.</p>

    <section class="log" id="log" aria-live="polite"></section>

    <details class="controls">
      <summary>Send test messages (when embedded)</summary>
      <div class="row">
        <label>Type
          <select id="testType">
            <option value="text">Text</option>
            <option value="image">Image</option>
            <option value="tts">TTS</option>
          </select>
        </label>
        <label>Prompt
          <input id="testPrompt" value="Write a short friendly greeting." />
        </label>
        <button id="sendTest">Send test message</button>
      </div>
      <p class="small">Note: When run as a top-level page, outbound messages go to window.opener if present. When embedded, messages go to parent.</p>
    </details>
  </main>

  <script type="module" src="main.js"></script>

</body>
</html>
